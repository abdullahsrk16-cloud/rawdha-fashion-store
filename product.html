<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <h1>Rawdha Fashion</h1>
</header>

<div class="product-page">

    <div class="product-image">
        <img id="mainImage"
        src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=700"
        width="450">
    </div>

    <div class="product-info">

        <h1>Premium T-Shirt</h1>

        <h2>$29</h2>

        <p>
            Premium cotton T-Shirt with luxury comfort.
        </p>

        <h3>Size</h3>

        <button>S</button>
        <button>M</button>
        <button>L</button>
        <button>XL</button>

        <br><br>

        <button onclick="addToCart('Premium T-Shirt',29)">
            Add To Cart
        </button>

        <button>
            Buy Now
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
